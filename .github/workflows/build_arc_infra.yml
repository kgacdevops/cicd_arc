name: Build Arc Infra
run-name: build arc infra
on:
  workflow_call:
    inputs:
      ACTION:
        description: "Action"
        type: string
      CLOUD_PROVIDER:
        description: "Cloud Provider"
        type: string
      REGION:
        description: "Region (Location)"
        type: string
      RUN_INSTALL_ARC:
        description: "Install ARC"
        type: string

jobs:
  build_infra:
    name: Build Infrastructure
    runs-on: [ubuntu-latest]
    environment: ${{ inputs.CLOUD_PROVIDER }}
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
    # Repo checkout
    - name: Checkout CICD Repository
      uses: actions/checkout@v4
      with:
        repository: kgacandole/cicd_arc
        ref: main
        path: cicd
    
    - name: Checkout Terraform Repository
      uses: actions/checkout@v4
      with:
        repository: kgacandole/iac_terraform
        ref: main
        path: iac

    # Pre-deploy steps
    - name: Setup up Google Cloud Auth
      if: inputs.CLOUD_PROVIDER == 'gcp'
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: "projects/${{ vars.GCP_PROJECT_NUM }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
        service_account: "${{ vars.SVC_ACCOUNT }}@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"
    
    - name: Setup Azure Auth
      if: inputs.CLOUD_PROVIDER == 'azure'
      uses: azure/login@v2
      with:
        client-id: ${{ vars.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    
    # Setup TF Vars
    - name: Prepare Vars
      id: vars
      uses: actions/github-script@v7
      with:
        script: |
          regionName = "${{ inputs.REGION }}"
          regionZone = ""

          checkRegion = "${{ inputs.REGION }}".match(/-[abc]$/)          
          if(checkRegion){
            regionZone = "${{ inputs.REGION }}"
            regionName = "${{ inputs.REGION }}".replaceAll(checkRegion[0], "")
          }
          
          core.setOutput("regionName", regionName)
          core.setOutput("regionZone", regionZone)
          core.setOutput("vmSize", JSON.parse(JSON.stringify(${{ vars.VM_SIZE_MAP }}))[regionName])
          
    - name: Setup TF Vars
      shell: bash
      run: |
        cd iac/arc_infra/${{ inputs.CLOUD_PROVIDER }}
        sed -i 's/{PREFIX}/${{ vars.RESOURCE_PREFIX }}/g' terraform.tfvars
        sed -i 's/{REGION}/${{ steps.vars.outputs.regionName }}/g' terraform.tfvars
        sed -i 's/{REGION_ZONE}/${{ steps.vars.outputs.regionZone }}/g' terraform.tfvars
        sed -i 's/{PROJECT_ID}/${{ vars.GCP_PROJECT_ID }}/g' terraform.tfvars
        sed -i 's/{VM_SIZE}/${{ steps.vars.outputs.vmSize }}/g' terraform.tfvars
        cat terraform.tfvars
    
    # Run Terraform
    - name: Run Terraform
      if: inputs.ACTION != 'skip'
      uses: kgacandole/cicd_arc/actions/run_terraform@main
      env:
        TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
        ARM_USE_OIDC: true
        ARM_USE_CLI: false
        ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
        ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        STORAGE_ACCOUNT_NAME: ${{ vars.STORAGE_ACCOUNT_NAME_TFSTATE }}
        RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP_TFSTATE }}                
      with:
        cloudProvider: ${{ inputs.CLOUD_PROVIDER }}
        tfAction: ${{ inputs.ACTION }}
    
    # Post Terraform Steps - Install/Setup ARC
    - name: Install ARC
      if: inputs.RUN_INSTALL_ARC == 'true' && inputs.ACTION != 'destroy'
      uses: kgacandole/cicd_arc/actions/install_arc@main
      with:
        cloudProvider: ${{ inputs.CLOUD_PROVIDER }}
        clusterName: "${{ vars.RESOURCE_PREFIX }}-cluster"
        regionName: ${{ inputs.REGION }}
        resourceGroupName: ${{ vars.AZURE_RESOURCE_GROUP_NAME }}
        subscriptionId: ${{ vars.AZURE_SUBSCRIPTION_ID }}