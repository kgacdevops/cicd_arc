name: Build Arc Infra
run-name: build arc infra
on:
  workflow_call:
    inputs:
      ACTION:
        description: "Action"
        type: string
      CLOUD_PROVIDER:
        description: "Cloud Provider"
        type: string
      REGION:
        description: "Region (Location)"
        type: string

jobs:
  build_infra:
    name: Build Infrastructure
    runs-on: [ubuntu-latest]
    environment: ${{ inputs.CLOUD_PROVIDER }}
    steps:
    - name: Generate GH Token
      env:
        GH_APP_ID: ${{ secrets.GH_APP_ID }}
        GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
        OWNER_NAME: kgacdevops
      uses: kgacdevops/github_automation_scripts/.github/actions/generateGithubToken@main

    - name: Checkout CICD Repository
      uses: actions/checkout@v4
      with:
        repository: kgacdevops/cicd_arc
        ref: main
        path: cicd
    
    - name: Checkout Terraform Repository
      uses: actions/checkout@v4
      with:
        repository: kgacdevops/iac_terraform
        ref: main
        path: iac

    # Pre-deploy steps
    - name: Setup up Google Cloud Auth
      if: inputs.CLOUD_PROVIDER == 'gcp'
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: "projects/${{ vars.GCP_PROJECT_NUM }}/locations/global/workloadIdentityPools/${{ vars.IDENTITY_POOL_NAME }}/providers/github-provider"
        service_account: "${{ vars.SVC_ACCOUNT }}@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"
    
    - name: Setup Azure Auth
      if: inputs.CLOUD_PROVIDER == 'azure'
      uses: azure/login@v2
      with:
        client-id: ${{ vars.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    
    # Run Terraform
    - name: Run Terraform
      if: inputs.ACTION != 'skip'
      uses: kgacdevops/cicd_arc/actions/run_terraform@main
      env:
        TERRAFORM_VERSION: ${{ vars.TERRAFORM_VERSION }}
        ARM_USE_OIDC: true
        ARM_USE_CLI: false
        ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
        ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        STORAGE_ACCOUNT_NAME: ${{ vars.STORAGE_ACCOUNT_NAME_TFSTATE }}
        RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP_TFSTATE }}                
      with:
        cloudProvider: ${{ inputs.CLOUD_PROVIDER }}
        tfAction: ${{ inputs.ACTION }}
        resourcePrefix: ${{ vars.RESOURCE_PREFIX }}
        vmSizeMap: ${{ vars.VM_SIZE_MAP }}
        projectId: ${{ vars.GCP_PROJECT_ID }}
        regionName: ${{ inputs.REGION }}
        tfStateBucket: ${{ vars.BUCKET_NAME_TFSTATE }}
        tfStateRg: ${{ vars.RESOURCE_GROUP_TFSTATE }}
        tfStateStorageAccount: ${{ vars.STORAGE_ACCOUNT_NAME_TFSTATE }}
  
  install_arc:
    name: Install Arc for ${{ inputs.CLOUD_PROVIDER }}
    if: inputs.ACTION == 'apply'
    uses: kgacdevops/cicd_arc/.github/workflows/install_arc.yml@main
    secrets: inherit
    needs: [build_infra]
    with:
      CLOUD_PROVIDER: ${{ inputs.CLOUD_PROVIDER }}
      REGION: ${{ inputs.REGION }}