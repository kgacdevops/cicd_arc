name: Install ARC
run-name: Install ARC
on:
  workflow_call:
    inputs:
      CLOUD_PROVIDER:
        description: "Cloud Provider"
        type: string
      REGION:
        description: "Region (Location)"
        type: string

jobs:
  install_arc:
    name: Install Arc
    runs-on: [ubuntu-latest]
    environment: ${{ inputs.CLOUD_PROVIDER }}
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
    - name: Validate Inputs
      uses: actions/github-script@v7
      with:
        script: |
          if(!(JSON.parse(JSON.stringify(${{ vars.VM_SIZE_MAP }})).hasOwnProperty("${{ inputs.REGION }}"))){
            core.setFailed("No resources provisioned for the region provided: ${{ inputs.REGION }}")
          }
          
    # Repo checkout
    - name: Checkout CICD Repository
      uses: actions/checkout@v4
      with:
        repository: kgacandole/cicd_arc
        ref: main
        path: cicd

    # Pre-deploy steps
    - name: Setup up Google Cloud Auth
      if: inputs.CLOUD_PROVIDER == 'gcp'
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: "projects/${{ vars.GCP_PROJECT_NUM }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
        service_account: "${{ vars.SVC_ACCOUNT }}@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com"
    
    - name: Setup Azure Auth
      if: inputs.CLOUD_PROVIDER == 'azure'
      uses: azure/login@v2
      with:
        client-id: ${{ vars.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}    
    
    # Post Terraform Steps - Install/Setup ARC
    - name: Install ARC
      uses: kgacandole/cicd_arc/actions/install_arc@main
      with:
        cloudProvider: ${{ inputs.CLOUD_PROVIDER }}
        clusterName: "${{ vars.RESOURCE_PREFIX }}-cluster"
        regionName: ${{ inputs.REGION }}
        resourceGroupName: "${{ vars.RESOURCE_PREFIX }}-aks-rg"
        subscriptionId: ${{ vars.AZURE_SUBSCRIPTION_ID }}